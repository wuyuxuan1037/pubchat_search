<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 字体预加载 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- 自动语言切换脚本 -->
  <script>
    (function () {
      const i18nSEO = {
        zh: {
          docTitle: "PubChat - 生物医学领域文献AI检索工具 | 智能PubMed搜索 & 综述生成 & 文献推送",
          docDesc: "PubChat 是一款专为生物医学科研人员设计的 AI 工具，支持自然语言转 MeSH 检索式、一键提取论文核心数据、自动生成文献综述及每日文献智能推送。助力高效科研，支持中英互译。"
        },
        en: {
          docTitle: "PubChat - AI Biomedical Literature Search | Smart PubMed, Review Gen & Alerts",
          docDesc: "PubChat is an AI tool designed for biomedical researchers. Features include Natural Language to MeSH conversion, one-click data extraction, automated literature reviews, and smart literature alerts. Supports English-Chinese translation."
        }
      };

      const userLang = navigator.language || navigator.userLanguage;

      if (userLang && userLang.toLowerCase().startsWith('zh')) {
        document.documentElement.lang = 'zh-CN';
        document.title = i18nSEO.zh.docTitle;
        let metaDesc = document.querySelector('meta[name="description"]');
        if (!metaDesc) {
          metaDesc = document.createElement('meta');
          metaDesc.name = "description";
          document.head.appendChild(metaDesc);
        }
        metaDesc.setAttribute("content", i18nSEO.zh.docDesc);
      } else {
        document.documentElement.lang = 'en';
        document.title = i18nSEO.en.docTitle;
        let metaDesc = document.querySelector('meta[name="description"]');
        if (metaDesc) {
          metaDesc.setAttribute("content", i18nSEO.en.docDesc);
        }
      }
    })();
  </script>

  <script type="module" crossorigin src="/assets/index-CRqp4OVn.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CqFrjEy3.css">
</head>

<body>
  <div id="root"></div>
  <!-- ✅ 只保留这一行源码入口 -->
</body>

</html>
